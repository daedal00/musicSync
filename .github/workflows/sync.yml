name: Sync music playlists

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

concurrency:
  group: music-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Restore private config and auth files
        env:
          MUSICSYNC_CONFIG_JSON: ${{ secrets.MUSICSYNC_CONFIG_JSON }}
          MUSICSYNC_SPOTIFY_TOKEN_CACHE: ${{ secrets.MUSICSYNC_SPOTIFY_TOKEN_CACHE }}
          MUSICSYNC_YTMUSIC_BROWSER_JSON: ${{ secrets.MUSICSYNC_YTMUSIC_BROWSER_JSON }}
        run: |
          set -euo pipefail
          if [ -z "$MUSICSYNC_CONFIG_JSON" ] || [ -z "$MUSICSYNC_SPOTIFY_TOKEN_CACHE" ] || [ -z "$MUSICSYNC_YTMUSIC_BROWSER_JSON" ]; then
            echo "Missing one or more required repository secrets." >&2
            echo "Required: MUSICSYNC_CONFIG_JSON, MUSICSYNC_SPOTIFY_TOKEN_CACHE, MUSICSYNC_YTMUSIC_BROWSER_JSON" >&2
            exit 1
          fi
          mkdir -p .secrets
          printf '%s' "$MUSICSYNC_CONFIG_JSON" > config.json
          printf '%s' "$MUSICSYNC_SPOTIFY_TOKEN_CACHE" > .secrets/spotify_token.cache
          printf '%s' "$MUSICSYNC_YTMUSIC_BROWSER_JSON" > .secrets/ytmusic_browser.json
          chmod 600 config.json .secrets/spotify_token.cache .secrets/ytmusic_browser.json

      - name: Sync playlists
        run: uv run sync_music.py sync
